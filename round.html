<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Reciclagem</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="theme.js"></script>
</head>

<body>
    <div id="game-screen" class="screen">
        <header>
            <div id="player-display">Jogador: <span></span></div>
            <div id="score-display">Rodada: <span id="round">1</span> | Pontos: <span id="score">0</span></div>
            <div id="timer-display" style="display:none; color: #ffeb3b;">Tempo: <span id="timer"></span>s</div>
        </header>

        <main id="game-area">
            <div id="hint-display"></div>
            <div id="trash-spawner">
                <!-- O Lixo será gerado aqui via JS -->
            </div>

            <div id="bins-container">
                <div class="bin blue" data-type="paper">
                    <img src="assets/bin/blue_bin_pixel.png" alt="Lixeira Azul - Papel" draggable="false">
                    <span>Papel</span>
                </div>
                <div class="bin red" data-type="plastic">
                    <img src="assets/bin/red_bin_pixel.png" alt="Lixeira Vermelha - Plástico" draggable="false">
                    <span>Plástico</span>
                </div>
                <div class="bin green" data-type="glass">
                    <img src="assets/bin/green_bin_pixel.png" alt="Lixeira Verde - Vidro" draggable="false">
                    <span>Vidro</span>
                </div>
                <div class="bin yellow" data-type="metal">
                    <img src="assets/bin/yellow_bin_pixel.png" alt="Lixeira Amarela - Metal" draggable="false">
                    <span>Metal</span>
                </div>
            </div>
        </main>
    </div>

    <script src="game.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Reciclagem</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <div id="start-screen" class="screen active">
        <h1>Jogo da Reciclagem</h1>
        <input type="text" id="player-name" placeholder="Seu nome..." autocomplete="off">
        <button id="start-btn">Começar!</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <header>
            <div id="player-display">Jogador: <span></span></div>
            <div id="score-display">Pontos: <span id="score">0</span></div>
        </header>

        <main id="game-area">
            <div id="hint-display"></div>
            <div id="trash-spawner">
                <!-- O Lixo será gerado aqui via JS -->
            </div>

            <div id="bins-container">
                <div class="bin blue" data-type="paper">
                    <img src="assets/blue_bin_pixel.png" alt="Lixeira Azul - Papel" draggable="false">
                    <span>Papel</span>
                </div>
                <div class="bin red" data-type="plastic">
                    <img src="assets/red_bin_pixel.png" alt="Lixeira Vermelha - Plástico" draggable="false">
                    <span>Plástico</span>
                </div>
                <div class="bin green" data-type="glass">
                    <img src="assets/green_bin_pixel.png" alt="Lixeira Verde - Vidro" draggable="false">
                    <span>Vidro</span>
                </div>
                <div class="bin yellow" data-type="metal">
                    <img src="assets/yellow_bin_pixel.png" alt="Lixeira Amarela - Metal" draggable="false">
                    <span>Metal</span>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
            gap: 40px;
        }

        .knight {
            /* Como a imagem tem 1024x128 no total, dividimos 1024 por 8 frames = 128px */
            width: 128px;
            height: 128px;
            background: url('Knight_1/Walk.png') left center;

            /* A animação usa steps(8) pois temos 8 quadros até o final da imagem (1024 / 128 = 8) */
            /* Aumentando o tempo de 0.8s para 1.5s resulta em movimentos mais lentos */
            animation: walk 1.5s steps(8) infinite;

            /* Escala aumentada para melhor zoom da animação pixel-art */
            transform: scale(3);
            image-rendering: pixelated;
            /* Deixa bordas pixeladas nítidas */
        }

        /* Deslizamos o fundo para a esquerda até o fim do total da largura da imagem */
        @keyframes walk {
            from {
                background-position: 0px;
            }

            to {
                background-position: -1024px;
            }
        }
    </style>
</head>

<body>
    <div class="knight"></div>
</body>

</html>
